name: Jarvis
type: theme
base theme: false
core_version_requirement: ^11 || ^12
description: 'DXPR-style SDC theme with Bootstrap 5, built for Drupal Canvas and Layout Builder.'
package: Jarvis
screenshot: screenshot.jpg
libraries:
  - jarvis/global
libraries-extend:
  canvas/canvas-ui:
    - jarvis/canvas-tray-autoexpand
    - jarvis/canvas-overlay
regions:
  header: Header
  primary_menu: 'Primary menu'
  breadcrumb: Breadcrumb
  help: Help
  page_title: 'Page title'
  hero: Hero
  highlighted: Highlighted
  content_top: 'Content top'
  sidebar_left: 'Left sidebar'
  content: Content
  sidebar_right: 'Right sidebar'
  content_bottom: 'Content bottom'
  footer: Footer
