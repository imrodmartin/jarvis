$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: 'Call to Action'
status: stable
description: 'Centered call-to-action: overline subtitle, heading, text and a buttons slot.'
category: Jarvis
props:
  type: object
  required:
    - heading
  properties:
    subtitle:
      title: Subtitle
      description: 'Small overline above the heading.'
      type: string
      examples:
        - 'Get started'
    heading:
      title: Heading
      type: string
      examples:
        - 'Ready to Get Started?'
    heading_level:
      title: 'Heading level'
      type: string
      enum: [h2, h3, h4]
      'meta:enum':
        h2: H2
        h3: H3
        h4: H4
      default: h2
    text:
      title: Text
      type: string
      examples:
        - 'Take the next step and discover how we can help you achieve your goals.'
    button_text:
      title: 'Button text'
      type: string
      examples:
        - 'Get started'
    button_href:
      title: 'Button link'
      type: string
      format: uri-reference
      examples:
        - '/node/1'
        - 'https://example.com'
    bg:
      title: 'Background color'
      type: string
      enum: [none, primary, secondary]
      'meta:enum':
        none: None
        primary: Primary
        secondary: Secondary
      default: none
    padding:
      title: Padding
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    padding_size:
      title: 'Padding size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    margin:
      title: Margin
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    margin_size:
      title: 'Margin size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    vertical_padding:
      title: 'Vertical padding (30px)'
      type: boolean
      default: true
