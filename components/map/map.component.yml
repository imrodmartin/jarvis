$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Map
status: stable
description: 'Google Map from a one-line address (simple_gmap-style keyless embed) with zoom and a link out.'
category: Jarvis
props:
  type: object
  required:
    - address
  properties:
    address:
      title: Address
      description: 'One-line address, e.g. "1600 Amphitheatre Parkway, Mountain View, CA".'
      type: string
      examples:
        - '1600 Amphitheatre Parkway, Mountain View, CA'
    zoom:
      title: Zoom
      description: 'Map zoom level (1 = world, 20 = building).'
      type: integer
      minimum: 1
      maximum: 20
      default: 14
    height:
      title: 'Map height (px)'
      type: integer
      default: 400
    show_link:
      title: 'Show Google Maps link'
      type: boolean
      default: true
    link_text:
      title: 'Link text'
      type: string
      default: 'View on Google Maps'
      examples:
        - 'View on Google Maps'
    padding:
      title: Padding
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    padding_size:
      title: 'Padding size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    margin:
      title: Margin
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    margin_size:
      title: 'Margin size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    vertical_padding:
      title: 'Vertical padding (30px)'
      type: boolean
      default: false
