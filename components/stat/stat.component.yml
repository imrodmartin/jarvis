$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Stat card
status: stable
description: 'Centered stat: icon, big number, description.'
category: Jarvis
libraryOverrides:
  dependencies:
    - core/drupal
    - core/once
props:
  type: object
  required:
    - title
  properties:
    icon:
      title: Icon
      $ref: json-schema-definitions://canvas.module/image
    title:
      title: 'Number'
      type: string
      examples:
        - '1,200+'
    number_color:
      title: 'Number color'
      # No `description` key: Canvas's prop-shape matcher fails structural
      # matching with it present and falls back to a plain textfield instead
      # of the enum select. Fallback note lives in the enum labels' behaviour:
      # picks that can't pass WCAG on the surrounding background render as the
      # section's safe text colour (matrix in overrides.css).
      type: string
      enum: [primary, secondary, dark, light]
      'meta:enum':
        primary: Primary
        secondary: Secondary
        dark: 'Dark (almost black)'
        light: 'Light (almost white)'
      default: primary
      examples:
        - primary
    count_up:
      title: 'Count-up animation'
      description: 'Animate the number from 0 when scrolled into view.'
      type: boolean
      default: false
    body:
      title: Description
      type: string
      contentMediaType: text/html
      'x-formatting-context': block
      examples:
        - '<p>Happy customers served</p>'
    padding:
      title: Padding
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    padding_size:
      title: 'Padding size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    margin:
      title: Margin
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    margin_size:
      title: 'Margin size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    vertical_padding:
      title: 'Vertical padding (30px)'
      type: boolean
      default: true
