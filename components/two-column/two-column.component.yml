$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: '2 Columns'
status: stable
description: 'Two columns side by side on desktop, stacked full-width on mobile.'
category: 'Jarvis Layout'
libraryOverrides:
  dependencies:
    - jarvis/contrast
props:
  type: object
  properties:
    width:
      title: 'Section width'
      type: string
      enum: [boxed, full]
      'meta:enum':
        boxed: 'Boxed (centred)'
        full: 'Full width'
      default: boxed
    background:
      title: 'Background colour'
      type: string
      enum: [none, primary, secondary, bg1, bg2, dark, light, image]
      'meta:enum':
        none: None
        primary: Primary
        secondary: Secondary
        bg1: 'Background 1'
        bg2: 'Background 2'
        dark: 'Dark (#1a1a1a)'
        light: 'Light (#f5f5f5)'
        image: 'Image (select below)'
      default: none
      examples:
        - none
    background_image:
      title: 'Background image'
      $ref: json-schema-definitions://canvas.module/image
      examples:
        - src: preview.svg
          alt: 'Sample image'
          width: 1200
          height: 800
    overlay:
      title: 'Image overlay opacity (%)'
      type: integer
      minimum: 0
      maximum: 100
      default: 45
    text_color:
      title: 'Text colour (overrides child components)'
      type: string
      enum: [inherit, primary, secondary, black, white]
      'meta:enum':
        inherit: Default
        primary: Primary
        secondary: Secondary
        black: Black
        white: White
      default: inherit
      examples:
        - inherit
    gap:
      title: 'Column gap'
      type: string
      enum: [none, small, normal, large]
      'meta:enum':
        none: None
        small: Small
        normal: Normal
        large: Large
      default: normal
      examples:
        - normal
    ratio:
      title: 'Column ratio'
      type: string
      enum: [even, wide-left, wide-right]
      'meta:enum':
        even: 'Even (1:1)'
        wide-left: 'Wide left (2:1)'
        wide-right: 'Wide right (1:2)'
      default: even
      examples:
        - even
    padding:
      title: Padding
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    padding_size:
      title: 'Padding size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    margin:
      title: Margin
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    margin_size:
      title: 'Margin size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    vertical_padding:
      title: 'Vertical padding (30px)'
      type: boolean
      default: true
slots:
  first:
    title: 'Column 1'
    description: 'Left / top column.'
    examples:
      - '<div style="padding:24px"><h3 style="margin:0 0 8px;font-size:1.4rem">Sample heading</h3><p style="margin:0;color:#555;line-height:1.5">A short line of placeholder text so the preview shows real content.</p></div>'
  second:
    title: 'Column 2'
    description: 'Right / bottom column.'
    examples:
      - '<div style="padding:24px"><h3 style="margin:0 0 8px;font-size:1.4rem">Sample heading</h3><p style="margin:0;color:#555;line-height:1.5">A short line of placeholder text so the preview shows real content.</p></div>'
