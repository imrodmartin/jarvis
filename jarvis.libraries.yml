global:
  version: 1.x
  css:
    base:
      libraries/bootstrap/css/bootstrap.min.css: { minified: true }
      css/overrides.css: {}
  js:
    libraries/bootstrap/js/bootstrap.bundle.min.js: { minified: true, attributes: { defer: true } }
    js/menu-touch.js: {}
    js/nav-branding.js: {}

# Font Awesome 6 Free (CDN). Attached per component via libraryOverrides.
# Icon-only decorative use; the accompanying text carries the meaning.
fontawesome:
  remote: https://fontawesome.com
  version: 6.5.2
  license:
    name: 'Font Awesome Free License'
    url: https://fontawesome.com/license/free
    gpl-compatible: true
  css:
    theme:
      https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css: { type: external, minified: true }

# Shared WCAG overlay auto-contrast for hero, card + column layouts
# (see js/contrast.js). Attached per component via libraryOverrides in their
# component.yml files.
contrast:
  version: 1.0.3
  js:
    js/contrast.js: {}

# Loaded onto the Canvas editor via libraries-extend (see jarvis.info.yml).
# Widens the right settings tray while a CKEditor field is focused.
canvas-tray-autoexpand:
  version: 1.x
  css:
    theme:
      css/canvas-tray.css: {}
  js:
    js/canvas-tray.js: {}
  dependencies:
    - core/once
    - core/drupal

# Loaded onto the Canvas editor via libraries-extend (see jarvis.info.yml).
# Overlay-opacity slider + live WCAG ✓/✗ badge on component prop forms.
canvas-overlay:
  version: 1.0.8
  css:
    theme:
      css/canvas-overlay.css: {}
  js:
    js/canvas-overlay.js: {}
  dependencies:
    - core/once
    - core/drupal

color-settings:
  version: 1.x
  css:
    theme:
      css/color-settings.css: {}
  js:
    js/color-settings.js: {}
  dependencies:
    - core/once
    - core/drupal

font-settings:
  version: 1.x
  css:
    theme:
      css/font-settings.css: {}
  js:
    js/font-settings.js: {}
  dependencies:
    - core/once
    - core/drupal
    - core/drupalSettings

fs-settings:
  version: 1.x
  css:
    theme:
      css/fs-settings.css: {}
  js:
    js/fs-settings.js: {}
  dependencies:
    - core/once
    - core/drupal
